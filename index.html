```html
<!DOCTYPE html>
<html>

<head>

<title>A Small Step Forward</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

canvas{
display:block;
margin:auto;
background:#222;
}

#textBox{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
width:600px;
padding:20px;
background:rgba(0,0,0,0.7);
color:white;
text-align:center;
font-size:20px;
border-radius:10px;
}

</style>

</head>

<body>

<canvas id="gameCanvas" width="700" height="500"></canvas>

<iframe
id="endingVideo"
width="700"
height="500"
style="display:none; position:absolute; top:0; left:50%; transform:translateX(-50%);"
src="https://www.youtube.com/embed/UNpBCDWP4zk?autoplay=1&mute=1"
frameborder="0"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>



<div id="textBox">
You wake up... Use arrow keys to move.
And press "e" to interact
</div>


<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

const textBox = document.getElementById("textBox");

const endingVideo = document.getElementById("endingVideo");

let scene = "bedroom";

let musicStarted = false;

let bedroomMusicState = "bed";

let videoStarted = false;

let keys = {};

document.addEventListener("keydown", e=>{

keys[e.key]=true;

if(!musicStarted){
bedroomMusic.play();
musicStarted = true;
}

});

document.addEventListener("keyup", e=>keys[e.key]=false);

let interactPressed = false;

document.addEventListener("keydown", function(e){

if(e.key === "e"){
interactPressed = true;
}
});

let nearbyObject = null;

/* BACKGROUND IMAGES */

const bedroomBG = new Image();
bedroomBG.src = "assets/bedroom.png";

const endingBG = new Image();
endingBG.src = "assets/ending.jpg";

const triviaBG = new Image();
triviaBG.src = "assets/trivia_background.png";

const bedroomMusic = new Audio("assets/bedroom_music.mp3");
const triviaMusic = new Audio("assets/trivia_music.mp3");
const endingMusic = new Audio("assets/speech_song.mp3");


bedroomMusic.loop = true;
triviaMusic.loop = true;
endingMusic.loop = true;

bedroomMusic.volume = 0.5;
triviaMusic.volume = 0.5;
endingMusic.volume = 0.6;


const bedroomUpperMusic = new Audio("assets/flying_song.mp3");
bedroomUpperMusic.loop = true;
bedroomUpperMusic.volume = 0.5;


/* PLAYER SPRITES */

const sprites = {

front: new Image(),
back: new Image(),
left: new Image(),
right: new Image(),

};

sprites.front.src = "assets/jc_front.png";
sprites.back.src = "assets/jc_back.png";
sprites.left.src = "assets/jc_left.png";
sprites.right.src = "assets/jc_right.png";

/* TRIVIA GIRL SPRITES */

const girlIdle = new Image();
girlIdle.src = "assets/jc_trivia.png";

const girlAnswer = new Image();
girlAnswer.src = "assets/got_it_jc.png";



/* PLAYER OBJECT */

let player = {

x:380,
y:280,
size:150,
speed:4,
direction:"down"

};



/* BEDROOM WALLS */

let bedroomWalls = [

{ x:0, y:0, width:700, height:40 },
{ x:0, y:520, width:700, height:40 },
{ x:0, y:0, width:40, height:500 },
{ x:760, y:0, width:40, height:500 },



];



/* Interactions */
let interactions = [

{
name:"dog",
x:380,
y:340,
width:120,
height:120,
text:"Your dog wags its tail happily. It seems glad you're up today."
},

{
name:"bed",
x:330,
y:200,
width:160,
height:100,
text:"Your bed looks cozy. Getting up was hard, but you did it."
},

{
name:"dresser",
x:600,
y:240,
width:120,
height:140,
text:"There is a framed photo here. It reminds you of good memories."
}

];



/* CLIFF AREA */

let cliff = {

x:200,
y:350,
width:300,
height:120

};

let girlPose = "idle";

/* TRIVIA QUESTIONS */

let triviaIndex = 0;

let trivia = [

{
question:"What house is Harry Potter in?",
choices:["1. Gryffindor","2. Slytherin","3. Ravenclaw"],
answer:1
},

{
question:"What district is Katniss from?",
choices:["1. District 12","2. District 4","3. District 7"],
answer:1
},

{
question:"In The Lion King, what is Simba's mother's name?",
choices:["1. Nala","2. Sarabi","3. Zira"],
answer:2
},

{
question:"In Toy Story, what game does Buzz Lightyear think he is playing when he first arrives?",
choices:["1. A training simulation","2. A rescue mission","3. A space war"],
answer:1
},

{
question:"In Lilo & Stitch, what experiment number is Stitch?",
choices:["1. 626","2. 421","3. 808"],
answer:1
},

{
question:"What spell is used to disarm an opponent in Harry Potter?",
choices:["1. Expelliarmus","2. Stupefy","3. Protego"],
answer:1
},

{
question:"What is the name of the poisonous berries used in the Hunger Games finale?",
choices:["1. Nightlock","2. Hemlock","3. Wolfsbane"],
answer:1
},

{question:"In Phineas and Ferb, what is the name of Dr. Doofenshmirtz's organization?",
choices:["1. OWCA","2. H.E.I.N.Z.","3. Evil Incorporated"],
answer:3
},

{
question:"What magical object allows Harry to see his parents in the first book?",
choices:["1. The Pensieve","2. The Mirror of Erised","3. The Resurrection Stone"],
answer:2
}

];



/* ENDING TEXT */

let endingText = [

"Congratulations!",
"The odds are always in your favor ",
"",
"Thank you for playing and for being you",
"It is not over you have one...",
"",
"Final",
"",
"Mission"

];

let scrollY = 500;


function stopAllMusic(){

bedroomMusic.pause();
triviaMusic.pause();
endingMusic.pause();
bedroomUpperMusic.pause();

bedroomMusic.currentTime = 0;
triviaMusic.currentTime = 0;
endingMusic.currentTime = 0;
bedroomUpperMusic.currentTime=0;

}


/* COLLISION FUNCTION */

function checkCollision(rect){

return player.x < rect.x + rect.width &&
player.x + player.size > rect.x &&
player.y < rect.y + rect.height &&
player.y + player.size > rect.y;

}



/* UPDATE */

function update(){

if(scene==="bedroom"){


let oldX = player.x;
let oldY = player.y;

if(keys["ArrowUp"]){
player.y -= player.speed;
player.direction="up";
}

if(keys["ArrowDown"]){
player.y += player.speed;
player.direction="down";
}

if(keys["ArrowLeft"]){
player.x -= player.speed;
player.direction="left";
}

if(keys["ArrowRight"]){
player.x += player.speed;
player.direction="right";
}

/* BEDROOM MUSIC ZONES */

if(player.y < 200 && bedroomMusicState !== "upper"){

stopAllMusic();
bedroomUpperMusic.play();
bedroomMusicState = "upper";

}

if(player.y >= 200 && bedroomMusicState !== "bed"){

stopAllMusic();
bedroomMusic.play();
bedroomMusicState = "bed";

}

/* WALL COLLISION */

for(let wall of bedroomWalls){

if(checkCollision(wall)){

player.x = oldX;
player.y = oldY;

}


if(interactPressed){

for(let obj of interactions){

if(checkCollision(obj)){

textBox.innerText = obj.text;

}

}

interactPressed = false;

}

}

if(interactPressed && nearbyObject){

textBox.innerText = nearbyObject.text;

interactPressed = false;

}

let bedroomDoor = {
x:720,
y:220,
width:100,
height:160
};

/* DOOR TO HALLWAY */

if(checkCollision(bedroomDoor)){

scene = "trivia";

stopAllMusic();
triviaMusic.play();

showTrivia();

}

}



/* CLIFF COLLISION */

if(scene==="ending"){

if(checkCollision(cliff)){

player.y -= player.speed;

}

}

}



/* DRAW PLAYER */

function drawPlayer(){

let sprite;

if(player.direction==="up") sprite=sprites.back;
if(player.direction==="down") sprite=sprites.front;
if(player.direction==="left") sprite=sprites.left;
if(player.direction==="right") sprite=sprites.right;

if(sprite){

ctx.drawImage(sprite,player.x,player.y,player.size,player.size);

}

nearbyObject = null;

for(let obj of interactions){

if(checkCollision(obj)){

nearbyObject = obj;

}

}
}



/* DRAW */

function draw(){

ctx.clearRect(0,0,700,500);

/* BEDROOM */
if(scene==="bedroom"){

    ctx.drawImage(bedroomBG,0,0,700,500);

    drawPlayer();

    if(nearbyObject){

        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(player.x - 40, player.y - 30, 120, 25);

        ctx.fillStyle = "white";
        ctx.font = "14px Arial";
        ctx.fillText("Press E", player.x - 25, player.y - 12);

    }

}
/* TRIVIA SCENE */

else if(scene==="trivia"){

ctx.drawImage(triviaBG,0,0,700,500);

/* Draw girl */

let girlSprite = girlPose === "answer" ? girlAnswer : girlIdle;

ctx.drawImage(girlSprite,200,280,200,200);

}

/* ENDING */

else if(scene==="ending"){

    ctx.drawImage(endingBG,0,0,700,500);

    ctx.fillStyle="rgba(0,0,0,0.4)";
    ctx.fillRect(0,0,700,500);

    ctx.fillStyle="white";
    ctx.font="24px Arial";

    for(let i=0;i<endingText.length;i++){

        ctx.fillText(endingText[i],200,scrollY + i*40);

    }

    scrollY -= 0.5;

    if(scrollY < -200 && !videoStarted){

videoStarted = true;

canvas.style.display = "none";
textBox.style.display="none";
endingVideo.style.display = "block";
stopAllMusic();


}

}

}



/* TRIVIA */

function showTrivia(){

if(triviaIndex >= trivia.length){

scene="ending";

stopAllMusic();
endingMusic.play();

textBox.innerText="";
return;

}

let q = trivia[triviaIndex];

textBox.innerHTML =
q.question + "<br><br>" +
q.choices.join("<br>") +
"<br><br>Press 1, 2, or 3";

}



/* ANSWERS */

document.addEventListener("keydown",function(e){

if(scene==="trivia"){

let answer = parseInt(e.key);

if(answer >= 1 && answer <= 3){

let correctAnswer = trivia[triviaIndex].answer;

if(answer === correctAnswer){

textBox.innerText = "Correct!";

}else{

textBox.innerText = "Not quite, but keep going!";
}
girlPose = "answer";
setTimeout(function(){

girlPose= "idle";
triviaIndex++;
showTrivia();

},800);

}

}

});


/* GAME LOOP */

function gameLoop(){

update();
draw();

requestAnimationFrame(gameLoop);

}
bedroomMusic.play();
gameLoop();

</script>

</body>

</html>
```
